<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Pose</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 300px; padding: 20px; background: #242424; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        #canvas-container { flex: 1; position: relative; }
        h1 { font-size: 1.2rem; color: #eee; }
        button { padding: 10px; background: #3a3a3a; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #4a4a4a; }
        input[type="file"] { color: white; }
        label { font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Image to Pose</h1>
        <input type="file" id="image-upload" accept="image/*">
        <button id="process-btn">Extract Pose</button>
        <div id="status">Upload an image to begin</div>
        <div>
            <label>Light X</label>
            <input type="range" id="light-x" min="-10" max="10" value="1" step="0.1" style="width:100%">
        </div>
        <div>
            <label>Light Y</label>
            <input type="range" id="light-y" min="-10" max="10" value="2" step="0.1" style="width:100%">
        </div>
        <div>
            <label>Light Z</label>
            <input type="range" id="light-z" min="-10" max="10" value="1" step="0.1" style="width:100%">
        </div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // ── Renderer / Scene / Camera ──────────────────────────────────────────
        const container = document.getElementById('canvas-container');
        const scene     = new THREE.Scene();
        const camera    = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer  = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x1a1a1a);
        container.appendChild(renderer.domElement);

        // ── Lights ─────────────────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // ── Grid ───────────────────────────────────────────────────────────────
        scene.add(new THREE.GridHelper(4, 10, 0x444444, 0x333333));

        // ── Orbit camera ───────────────────────────────────────────────────────
        let isMouseDown = false;
        let prevMouse   = { x: 0, y: 0 };
        let spherical   = { theta: 0, phi: Math.PI / 3, radius: 3 };

        function updateCamera() {
            camera.position.set(
                spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
                spherical.radius * Math.cos(spherical.phi),
                spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
            );
            camera.lookAt(0, 1, 0);
        }

        renderer.domElement.addEventListener('mousedown', e => { isMouseDown = true; prevMouse = { x: e.clientX, y: e.clientY }; });
        renderer.domElement.addEventListener('mouseup',   () => isMouseDown = false);
        renderer.domElement.addEventListener('mousemove', e => {
            if (!isMouseDown) return;
            spherical.theta -= (e.clientX - prevMouse.x) * 0.01;
            spherical.phi    = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + (e.clientY - prevMouse.y) * 0.01));
            prevMouse = { x: e.clientX, y: e.clientY };
            updateCamera();
        });
        renderer.domElement.addEventListener('wheel', e => {
            spherical.radius = Math.max(1, Math.min(10, spherical.radius + e.deltaY * 0.01));
            updateCamera();
        });
        updateCamera();

        // ── Skeleton overlay ───────────────────────────────────────────────────
        const SKELETON = [
            [0,1],[0,2],[1,3],[2,4],[0,5],[0,6],
            [5,6],[5,7],[7,9],[6,8],[8,10],
            [5,11],[6,12],[11,12],
            [11,13],[13,15],[12,14],[14,16]
        ];

        // COCO keypoint order:
        // 0=nose, 1=left_eye, 2=right_eye, 3=left_ear, 4=right_ear,
        // 5=left_shoulder, 6=right_shoulder, 7=left_elbow, 8=right_elbow,
        // 9=left_wrist, 10=right_wrist, 11=left_hip, 12=right_hip,
        // 13=left_knee, 14=right_knee, 15=left_ankle, 16=right_ankle
        const dummyKeypoints = [
    [0,    1.5,  0],   // 0  nose
    [-0.05,1.55, 0],   // 1  left_eye
    [0.05, 1.55, 0],   // 2  right_eye
    [-0.1, 1.53, 0],   // 3  left_ear
    [0.1,  1.53, 0],   // 4  right_ear
    [-0.25,1.2,  0],   // 5  left_shoulder
    [0.25, 1.0, 0.3],   // 6  right_shoulder
    [-0.35, 1.0, 0],   // 7  left_elbow
    [0.35, 1.2,  0.3],   // 8  right_elbow
    [-0.45,1.2,  0],   // 9  left_wrist
    [0.45, 1.2,  0],   // 10 right_wrist
    [-0.2, 0.7,  0],   // 11 left_hip
    [0.2,  0.7,  0],   // 12 right_hip
    [0.35,0.35, -0.3],   // 13 left_knee
    [0.35, 0.35, 0],   // 14 right_knee
    [-0.2, 0.05, 0],   // 15 left_ankle
    [0.2,  0.05, 0],   // 16 right_ankle
];

        let skeletonGroup = new THREE.Group();
        skeletonGroup.visible = false;
        scene.add(skeletonGroup);

        function drawSkeleton(keypoints) {
            scene.remove(skeletonGroup);
            skeletonGroup = new THREE.Group();
            scene.add(skeletonGroup);
            keypoints.forEach(([x, y, z]) => {
                const m = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0x00ff88 })
                );
                m.position.set(x, y, z);
                skeletonGroup.add(m);
            });
            SKELETON.forEach(([i, j]) => {
                const geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(...keypoints[i]),
                    new THREE.Vector3(...keypoints[j])
                ]);
                skeletonGroup.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffffff })));
            });
        }

        // ── Mannequin ──────────────────────────────────────────────────────────
        let mannequin    = null;
        let modelWrapper = null;
        const restPose   = {};

        function getBone(name) {
            let found = null;
            mannequin.traverse(c => { if (c.isBone && c.name === name) found = c; });
            return found;
        }

        function rotateBoneTowards(boneName, fromKp, toKp, restDir) {
            const bone = getBone(boneName);
            if (!bone || !restPose[boneName]) return;

            const targetWorld = new THREE.Vector3(
                toKp[0] - fromKp[0],
                toKp[1] - fromKp[1],
                toKp[2] - fromKp[2]
            ).normalize();

            const parentWorldQuat = new THREE.Quaternion();
            if (bone.parent) bone.parent.getWorldQuaternion(parentWorldQuat);
            const localTarget = targetWorld.clone().applyQuaternion(parentWorldQuat.clone().invert());

            const q = new THREE.Quaternion().setFromUnitVectors(restDir, localTarget);
            bone.quaternion.copy(restPose[boneName]).premultiply(q);
            bone.updateMatrix();
        }

        function poseMannequin(keypoints) {
            if (!mannequin) return;
            const kp = keypoints;

            // restDir vectors from getBoneWorldDir() after upright correction:
            // Left arm bones point in -Z, right arm bones point in +Z, legs point down
            const down = new THREE.Vector3( 0,  -1,  0);
            const negZ = new THREE.Vector3( 0,   0, -1);
            const posZ = new THREE.Vector3( 0,   0,  1);
            const up   = new THREE.Vector3( 0,  1,  0);  // ← add this

            rotateBoneTowards('ArmL_011',     kp[5],  kp[7],  negZ);
            rotateBoneTowards('ForearmL_012', kp[7],  kp[9],  negZ);
            rotateBoneTowards('ArmR_08',      kp[6],  kp[8],  posZ);
            rotateBoneTowards('ForearmR_09',  kp[8],  kp[10], posZ);
            rotateBoneTowards('ThighL_01',    kp[11], kp[13], down);
            rotateBoneTowards('LegL_02',   kp[13], kp[15], up);   // changed from down
            rotateBoneTowards('LegR_015',  kp[14], kp[16], up);   // changed from down
            rotateBoneTowards('ThighR_014',   kp[12], kp[14], down);
  

            mannequin.updateMatrixWorld(true);
        }

        // ── Load GLB ───────────────────────────────────────────────────────────
        const loader = new THREE.GLTFLoader();

        loader.load('wooden.glb', function(gltf) {
            mannequin = gltf.scene;

            // Stand the model upright (it's Z-up from Blender/Sketchfab)
            mannequin.rotation.y = Math.PI / 2;
            mannequin.updateMatrixWorld(true);

            // Store rest pose AFTER upright correction so restDir vectors are valid
            mannequin.traverse(child => {
                if (child.isBone) restPose[child.name] = child.quaternion.clone();
                if (child.isMesh) child.material = new THREE.MeshPhongMaterial({ color: 0xd4a97a, shininess: 40 });
            });

            // Wrap for positioning only — no rotation on wrapper
            modelWrapper = new THREE.Group();
            modelWrapper.scale.set(0.4, 0.4, 0.4);
            modelWrapper.add(mannequin);
            scene.add(modelWrapper);

            // Centre on grid
            const box    = new THREE.Box3().setFromObject(modelWrapper);
            const center = box.getCenter(new THREE.Vector3());
            modelWrapper.position.x -= center.x;
            modelWrapper.position.z -= center.z;
            modelWrapper.position.y -= box.min.y;

            poseMannequin(dummyKeypoints);
            console.log('Model loaded and posed');
        }, undefined, err => console.error('GLB load error:', err));

        // ── Light arrow ────────────────────────────────────────────────────────
        function drawLightArrow(direction) {
            const existing = scene.getObjectByName('lightArrow');
            if (existing) scene.remove(existing);
            const group = new THREE.Group();
            group.name  = 'lightArrow';
            group.add(new THREE.ArrowHelper(
                new THREE.Vector3(...direction).normalize(),
                new THREE.Vector3(0, 1, 0), 0.8, 0xffff00, 0.2, 0.1
            ));
            scene.add(group);
            dirLight.position.set(direction[0] * 5, direction[1] * 5, direction[2] * 5);
        }

        drawLightArrow([1, 2, 1]);

        ['light-x', 'light-y', 'light-z'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                drawLightArrow([
                    parseFloat(document.getElementById('light-x').value),
                    parseFloat(document.getElementById('light-y').value),
                    parseFloat(document.getElementById('light-z').value)
                ]);
            });
        });

        // ── Image upload preview ───────────────────────────────────────────────
        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const existing = document.getElementById('image-preview');
                if (existing) existing.remove();
                const img = document.createElement('img');
                img.id = 'image-preview';
                img.src = ev.target.result;
                img.style.cssText = 'width:100%; border-radius:6px; margin-top:8px;';
                document.getElementById('status').after(img);
            };
            reader.readAsDataURL(file);
        });

        // ── Backend call ───────────────────────────────────────────────────────
        document.getElementById('process-btn').addEventListener('click', async function() {
            const file = document.getElementById('image-upload').files[0];
            if (!file) { document.getElementById('status').textContent = 'Please upload an image first'; return; }
            document.getElementById('status').textContent = 'Processing...';
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch('http://localhost:8000/predict', { method: 'POST', body: formData });
                const data     = await response.json();
                drawSkeleton(data.keypoints_3d);
                poseMannequin(data.keypoints_3d);
                drawLightArrow(data.light_direction);
                document.getElementById('status').textContent = 'Done!';
            } catch (err) {
                document.getElementById('status').textContent = 'Error connecting to backend';
                console.error(err);
            }
        });

        // ── Render loop ────────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            if (!isMouseDown) spherical.theta += 0.003;
            updateCamera();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
