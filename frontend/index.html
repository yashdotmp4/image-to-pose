<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Pose</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 300px; padding: 20px; background: #242424; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        #canvas-container { flex: 1; position: relative; }
        h1 { font-size: 1.2rem; color: #eee; }
        button { padding: 10px; background: #3a3a3a; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #4a4a4a; }
        input[type="file"] { color: white; }
        label { font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Image to Pose</h1>
        <input type="file" id="image-upload" accept="image/*">
        <button id="process-btn">Extract Pose</button>
        <div id="status">Upload an image to begin</div>
        <div>
            <label>Light X</label>
            <input type="range" id="light-x" min="-10" max="10" value="1" step="0.1" style="width:100%">
        </div>
        <div>
            <label>Light Y</label>
            <input type="range" id="light-y" min="-10" max="10" value="2" step="0.1" style="width:100%">
        </div>
        <div>
            <label>Light Z</label>
            <input type="range" id="light-z" min="-10" max="10" value="1" step="0.1" style="width:100%">
        </div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x1a1a1a);
        container.appendChild(renderer.domElement);

        // lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // grid floor
        const gridHelper = new THREE.GridHelper(4, 10, 0x444444, 0x333333);
        scene.add(gridHelper);

        // spherical camera rotation
        let isMouseDown = false;
        let prevMouse = { x: 0, y: 0 };
        let spherical = { theta: 0, phi: Math.PI / 3, radius: 3 };

        function updateCamera() {
            camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
            camera.position.y = spherical.radius * Math.cos(spherical.phi);
            camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
            camera.lookAt(0, 1, 0);
        }

        renderer.domElement.addEventListener('mousedown', e => {
            isMouseDown = true;
            prevMouse = { x: e.clientX, y: e.clientY };
        });
        renderer.domElement.addEventListener('mouseup', () => isMouseDown = false);
        renderer.domElement.addEventListener('mousemove', e => {
            if (!isMouseDown) return;
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            spherical.theta -= dx * 0.01;
            spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.01));
            prevMouse = { x: e.clientX, y: e.clientY };
            updateCamera();
        });
        renderer.domElement.addEventListener('wheel', e => {
            spherical.radius = Math.max(1, Math.min(10, spherical.radius + e.deltaY * 0.01));
            updateCamera();
        });

        updateCamera();

        // skeleton
        const SKELETON = [
            [0,1],[0,2],[1,3],[2,4],
            [0,5],[0,6],
            [5,6],[5,7],[7,9],[6,8],[8,10],
            [5,11],[6,12],[11,12],
            [11,13],[13,15],[12,14],[14,16]
        ];

        const dummyKeypoints = [
            [0, 1.7, 0], [-0.1, 1.75, 0], [0.1, 1.75, 0],
            [-0.2, 1.7, 0], [0.2, 1.7, 0], [-0.3, 1.4, 0],
            [0.3, 1.4, 0], [-0.5, 1.0, 0], [0.5, 1.0, 0],
            [-0.6, 0.6, 0], [0.6, 0.6, 0], [-0.2, 0.9, 0],
            [0.2, 0.9, 0], [-0.2, 0.5, 0], [0.2, 0.5, 0],
            [-0.2, 0.0, 0], [0.2, 0.0, 0],
        ];

        let skeletonGroup = new THREE.Group();
        scene.add(skeletonGroup);

        function drawSkeleton(keypoints) {
            scene.remove(skeletonGroup);
            skeletonGroup = new THREE.Group();
            scene.add(skeletonGroup);

            keypoints.forEach(([x, y, z]) => {
                const geo = new THREE.SphereGeometry(0.04, 8, 8);
                const mat = new THREE.MeshPhongMaterial({ color: 0x00ff88 });
                const sphere = new THREE.Mesh(geo, mat);
                sphere.position.set(x, y, z);
                skeletonGroup.add(sphere);
            });

            SKELETON.forEach(([i, j]) => {
                const points = [
                    new THREE.Vector3(...keypoints[i]),
                    new THREE.Vector3(...keypoints[j])
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
                skeletonGroup.add(new THREE.Line(geo, mat));
            });
        }

        drawSkeleton(dummyKeypoints);

        // load mannequin model
        let mannequin = null;
        const loader = new THREE.GLTFLoader();
        loader.load('low_poly_mannequin_free.glb', function(gltf) {
        mannequin = gltf.scene;
        mannequin.scale.set(1, 1, 1);
        mannequin.position.set(0, 0, 0);
        mannequin.traverse(child => {
            if (child.isMesh) {
                child.material = new THREE.MeshPhongMaterial({ 
                    color: 0xcccccc,
                    shininess: 30
                });
            }
        });
        scene.add(mannequin);
        skeletonGroup.visible = false;
        console.log('Model loaded');
    }, undefined, function(error) {
        console.error('Error loading model:', error);
    });

        // light arrow
        function drawLightArrow(direction) {
            const existing = scene.getObjectByName('lightArrow');
            if (existing) scene.remove(existing);

            const arrowGroup = new THREE.Group();
            arrowGroup.name = 'lightArrow';
            const dir = new THREE.Vector3(...direction).normalize();
            const arrowHelper = new THREE.ArrowHelper(dir, new THREE.Vector3(0, 1, 0), 0.8, 0xffff00, 0.2, 0.1);
            arrowGroup.add(arrowHelper);
            scene.add(arrowGroup);

            dirLight.position.set(direction[0] * 5, direction[1] * 5, direction[2] * 5);
        }

        drawLightArrow([1, 2, 1]);

        ['light-x', 'light-y', 'light-z'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const x = parseFloat(document.getElementById('light-x').value);
                const y = parseFloat(document.getElementById('light-y').value);
                const z = parseFloat(document.getElementById('light-z').value);
                drawLightArrow([x, y, z]);
            });
        });

        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const existing = document.getElementById('image-preview');
                if (existing) existing.remove();
                const img = document.createElement('img');
                img.id = 'image-preview';
                img.src = ev.target.result;
                img.style.cssText = 'width:100%; border-radius:6px; margin-top:8px;';
                document.getElementById('status').after(img);
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('process-btn').addEventListener('click', async function() {
            const file = document.getElementById('image-upload').files[0];
            if (!file) {
                document.getElementById('status').textContent = 'Please upload an image first';
                return;
            }
            document.getElementById('status').textContent = 'Processing...';
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                drawSkeleton(data.keypoints_3d);
                drawLightArrow(data.light_direction);
                document.getElementById('status').textContent = 'Done!';
            } catch (err) {
                document.getElementById('status').textContent = 'Error connecting to backend';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (!isMouseDown) spherical.theta += 0.005;
            updateCamera();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
